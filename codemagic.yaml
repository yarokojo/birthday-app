workflows:
  build-android:
    name: Build Android APK
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    cache:
      cache_paths:
        - ~/.npm
    scripts:
      - name: Show Node version
        script: node --version   # Should print v20.x.x
      - name: Force Node 20 (if needed)
        script: |
          if ! node --version | grep -q "v20"; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
          fi
      - name: Clean install (remove cache)
        script: rm -rf node_modules package-lock.json
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.apk
