name: Build Android APK
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Patch Reanimated
        run: |
          # Fix reanimated compatibility
          sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/g' node_modules/react-native-reanimated/android/build.gradle
          sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/g' node_modules/react-native-reanimated/android/build.gradle
      
      - name: Prebuild Android
        run: npx expo prebuild --clean --platform android --no-install
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
